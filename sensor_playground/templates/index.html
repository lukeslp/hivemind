<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Playground Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-size: 14px;
            touch-action: none;
        }
        .container-fluid {
            height: 100vh;
            padding: 10px;
        }
        .dashboard-panel {
            height: 60%;
            overflow-y: auto;
            border-bottom: 1px solid #ccc;
        }
        .chat-panel {
            height: 40%;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .chat-input {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .sensor-card {
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
        }
        .alert {
            background-color: #f8d7da;
            color: #842029;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="dashboard-panel">
            <h5>Sensor Dashboard</h5>
            <div id="sensorGrid" class="sensor-grid"></div>
        </div>
        <div class="chat-panel">
            <h5>Chat with Assistant</h5>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" class="form-control" placeholder="Ask a question...">
                <button onclick="sendMessage()" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const socket = io();

        socket.on('sensor_update', function(data) {
            updateSensorDashboard(data);
        });

        function updateSensorDashboard(data) {
            let html = '';
            for (const [key, sensor] of Object.entries(data)) {
                const isAlert = sensor.value < sensor.normal_range[0] || sensor.value > sensor.normal_range[1];
                html += `
                    <div class="sensor-card ${isAlert ? 'alert' : ''}">
                        <strong>${key.charAt(0).toUpperCase() + key.slice(1)}</strong><br>
                        ${sensor.value} ${sensor.unit}<br>
                        <small>Range: ${sensor.normal_range[0]}-${sensor.normal_range[1]}</small>
                    </div>
                `;
            }
            document.getElementById('sensorGrid').innerHTML = html;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message) {
                appendMessage('You', message);
                input.value = '';
                // Placeholder for sending message to VPS LLM API
                fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                })
                .then(response => response.json())
                .then(data => {
                    appendMessage('Assistant', data.response);
                })
                .catch(error => {
                    appendMessage('Error', 'Failed to get response.');
                    console.error(error);
                });
            }
        }

        function appendMessage(sender, text) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Enable sending message on Enter key
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
